services:
  - type: web
    name: yarddesk-api
    runtime: node
    plan: free
    region: singapore
    rootDir: backend
    # Free tier doesn't support preDeployCommand, so the migration runs as part of the
    # build instead — still safe/non-interactive (never `migrate dev` in production).
    # --include=dev is required: Render's build step also sees NODE_ENV=production,
    # which makes plain `npm install` skip devDependencies — including @nestjs/cli's
    # `nest` binary that `npm run build` needs.
    buildCommand: npm install --include=dev && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
